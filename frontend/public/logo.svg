<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Envelope body -->
  <rect x="6" y="20" width="36" height="26" rx="3" fill="#3B82F6" stroke="#1E40AF" stroke-width="1.5"/>
  <!-- Envelope flap -->
  <path d="M6 23l18 13 18-13" fill="#60A5FA" stroke="#1E40AF" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Envelope flap top -->
  <path d="M6 20l18 14 18-14" fill="none" stroke="#1E40AF" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Envelope lines (letter content hint) -->
  <line x1="12" y1="36" x2="30" y2="36" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="40" x2="24" y2="40" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Magnifying glass circle -->
  <circle cx="42" cy="18" r="14" fill="white" fill-opacity="0.15" stroke="#F59E0B" stroke-width="2.5"/>
  <circle cx="42" cy="18" r="14" fill="none" stroke="#D97706" stroke-width="1.5"/>
  <!-- Magnifying glass inner ring -->
  <circle cx="42" cy="18" r="10.5" fill="white" fill-opacity="0.1" stroke="#FCD34D" stroke-width="1"/>
  <!-- Glass shine -->
  <path d="M35 12a9 9 0 0 1 6-3" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Magnifying glass handle -->
  <line x1="52.5" y1="28.5" x2="60" y2="36" stroke="#D97706" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="52.5" y1="28.5" x2="60" y2="36" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
</svg>
